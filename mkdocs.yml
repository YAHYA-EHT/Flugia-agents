site_name: Flugia — Documentation Technique
site_description: Plateforme multi-agents IA — Marketing, Sales, Support

theme:
  name: material
  palette:
    primary: cyan
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight

nav:
  - Accueil: index.md
  - Architecture: architecture.md
  - Installation: installation.md
